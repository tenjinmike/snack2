<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 당첨기 - 행운을 드립니다</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="dark-mode">
    <div class="app-container">
        <header>
            <div class="header-top">
                <h1>로또 당첨기 🍀</h1>
                <button id="theme-toggle" class="icon-btn" aria-label="테마 전환">
                    <span class="theme-icon">🌙</span>
                </button>
            </div>
            <p class="subtitle">오늘의 당첨 행운을 잡으세요!</p>
        </header>

        <main>
            <div id="lotto-board" class="lotto-board">
                <!-- 로또 번호 행들이 여기에 생성됩니다 -->
            </div>
            
            <div class="actions">
                <button id="generate-btn" class="primary-btn glow-btn">행운의 번호 추출</button>
            </div>
        </main>

        <footer>
            <p>© 2026 Lotto Winner Generator</p>
        </footer>
    </div>
    <script src="main.js"></script>
</body>
</html>
